{% if voiture.types_location %}
<div class="flex flex-wrap gap-2">
    {% for tl in voiture.types_location %}
    <span class="inline-flex items-center gap-1.5 bg-gray-100 text-gray-700 text-xs font-medium px-3 py-1.5 rounded-full">
        {{ tl.nom }} — {{ "{:,}".format(tl.prix) }} Ar
        <button
            hx-post="/admin/voitures/{{ voiture.id }}/types/{{ tl.id }}/delete"
            hx-target="#types-location-{{ voiture.id }}"
            hx-swap="innerHTML"
            class="text-gray-400 hover:text-red-500 transition-colors ml-1 leading-none">
            ✕
        </button>
    </span>
    {% endfor %}
</div>
{% else %}
<p class="text-xs text-gray-400 italic">Aucun tarif défini.</p>
{% endif %}
