<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — TM_Location</title>
    <!-- Thème centralisé : polices et couleurs -->
    <link rel="stylesheet" href="/static/css/theme.css">

    <link rel="stylesheet" href="/static/css/dist.css">
    <script src="/static/js/vendor/htmx.min.js"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-swapping { opacity: 0; transition: opacity 150ms ease-out; }
        .htmx-settling { opacity: 1; transition: opacity 150ms ease-in; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Header mobile -->
    <header class="lg:hidden bg-gray-900 text-white px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div>
            <p class="text-xs text-gray-400">TM_Location</p>
            <p class="font-bold text-sm">Admin</p>
        </div>
        <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')"
            class="p-2 rounded-lg hover:bg-gray-700 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <!-- Menu mobile déroulant -->
    <nav id="mobile-menu" class="hidden lg:hidden bg-gray-800 text-white px-4 py-3 space-y-1">
        <a href="/admin" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if active == 'dashboard' %}bg-gray-700{% else %}text-gray-300 hover:bg-gray-700{% endif %}">
            <span>📊</span> Dashboard
        </a>
        <a href="/admin/reservations" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if active == 'reservations' %}bg-gray-700{% else %}text-gray-300 hover:bg-gray-700{% endif %}">
            <span>📋</span> Réservations
        </a>
        <a href="/admin/voitures" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if active == 'voitures' %}bg-gray-700{% else %}text-gray-300 hover:bg-gray-700{% endif %}">
            <span>🚗</span> Voitures
        </a>
        <a href="/" class="flex items-center gap-3 px-3 py-2.5 text-xs text-gray-400 hover:text-white">← Retour au site</a>
        <a href="/admin/logout" class="flex items-center gap-3 px-3 py-2.5 text-xs text-red-400 hover:text-red-300">Déconnexion</a>
    </nav>

    <div class="flex min-h-screen">

        <!-- Sidebar desktop -->
        <aside class="hidden lg:flex w-56 bg-gray-900 text-white flex-col min-h-screen fixed top-0 left-0">
            <div class="px-6 py-5 border-b border-gray-700">
                <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">TM_Location</p>
                <p class="font-bold text-lg">Admin</p>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="/admin" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors {% if active == 'dashboard' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">
                    <span>📊</span> Dashboard
                </a>
                <a href="/admin/reservations" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors {% if active == 'reservations' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">
                    <span>📋</span> Réservations
                </a>
                <a href="/admin/voitures" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors {% if active == 'voitures' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">
                    <span>🚗</span> Voitures
                </a>
            </nav>
            <div class="px-6 py-4 border-t border-gray-700 space-y-2">
                <a href="/" class="block text-xs text-gray-400 hover:text-white transition-colors">← Retour au site</a>
                <a href="/admin/logout" class="block text-xs text-red-400 hover:text-red-300 transition-colors">Déconnexion</a>
            </div>
        </aside>

        <!-- Contenu principal -->
        <main class="flex-1 lg:ml-56 p-4 lg:p-8">
            {% block content %}{% endblock %}
        </main>

    </div>

</body>
</html>
