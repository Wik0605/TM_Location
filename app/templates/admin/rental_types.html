{% extends "admin/base_admin.html" %}
{% set active = "rental_types" %}

{% block title %}Types de location{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-8">Types de location</h1>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

    <!-- Liste existante -->
    <div>
        <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wider mb-4">Types existants</h2>
        {% include "admin/partials/_rental_types_list.html" %}
    </div>

    <!-- Formulaire création -->
    <div>
        <h2 class="text-sm font-semibold text-gray-600 uppercase tracking-wider mb-4">Nouveau type</h2>
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
            <form hx-post="/admin/rental-types/create"
                  hx-target="#rental-types-list"
                  hx-swap="outerHTML"
                  class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Nom *</label>
                        <input type="text" name="name" required placeholder="Ex: Mensuelle"
                            class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Durée (jours) *</label>
                        <input type="number" name="duration_days" min="1" required
                            class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Prix fixe (Ar)</label>
                        <input type="number" name="prix_fixe" step="500" min="0"
                            placeholder="Ex: 75000"
                            class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Remise (%)</label>
                        <input type="number" name="discount_percent" step="0.5" min="0" max="100" value="0"
                            class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Conso. (L/100km)</label>
                        <input type="number" name="fuel_consumption" step="0.1" min="0"
                            placeholder="Ex: 8"
                            class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Prix carburant (Ar/L)</label>
                        <input type="number" name="fuel_price" step="100" min="0"
                            placeholder="Ex: 4900"
                            class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Description</label>
                    <input type="text" name="description" placeholder="Ex: Idéal pour les longs séjours"
                        class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
                </div>
                <button type="submit"
                    class="w-full bg-emerald-600 text-white text-sm py-2.5 rounded-lg font-semibold hover:bg-emerald-700 transition-colors">
                    Créer le type
                </button>
            </form>
        </div>
    </div>

</div>
{% endblock %}
